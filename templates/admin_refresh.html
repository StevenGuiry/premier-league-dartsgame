{% extends "base.html" %}
{% block title %}Admin — Refresh Players{% endblock %}

{% block content %}
<div class="lobby-wrap">
    <h2 class="page-title orbitron" style="text-align:center;margin-bottom:24px">Refresh Player Data</h2>

    <div class="card" style="max-width:600px;margin:0 auto">
        <p style="color:var(--text-dim);margin-bottom:20px">
            Upload a fresh <code>players_pl.json</code> produced by the local scrape script.
            This replaces all player data and rebuilds the prompt pool.
        </p>
        <form method="POST" enctype="multipart/form-data">
            <div class="form-group">
                <label for="players_json">players_pl.json</label>
                <input type="file" id="players_json" name="players_json" accept=".json" required
                       style="background:rgba(255,255,255,0.1);border:2px solid rgba(255,255,255,0.2);border-radius:10px;padding:12px 16px;color:#fff;width:100%">
            </div>
            <button type="submit" class="btn">Upload and Refresh</button>
        </form>
    </div>
</div>
{% endblock %}
