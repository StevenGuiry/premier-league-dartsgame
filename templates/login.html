{% extends "base.html" %}
{% block title %}Sign In — Premier League Darts{% endblock %}

{% block content %}
<div class="login-wrap">
    <div class="card login-card">

        <div class="login-strip">
            <div class="login-strip-side">501</div>
            <div class="login-strip-mid">Premier League<br>Darts</div>
            <div class="login-strip-side">501</div>
        </div>

        <h1>Sign In</h1>
        <p class="subtitle">Enter any username — your profile is created automatically</p>

        <form method="POST" action="{{ url_for('main.login') }}">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username"
                       placeholder="Your username" required maxlength="32" autofocus>
            </div>
            <button type="submit" class="btn" style="width:100%">Start Playing</button>
        </form>

    </div>
</div>
{% endblock %}
